idea:
  title: How do we make sure Skills/Self-Evolving is creating something new rather
    than finding a better way to exploit what LLMs have already learned?
  domain: artificial_intelligence
  hypothesis: 'The core motivation is to confirm whether existing self-evolving algorithms
    are leading LLMs to create new ideas (e.g., examples of creating new ideas include
    developing the Theory of Relativity or Attention), or whether we are just seeking
    some new prompt optimization solution.

